<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えほんのもり</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        cream: { 50: '#FFF9F5', 100: '#FFF0E6', 200: '#FDDCB5' },
        warm: { 300: '#E8A87C', 400: '#C4825A', 500: '#4A3728', 600: '#8B7B6B', 700: '#B8A99A' },
        pk: { 300: '#F4C2C2', 400: '#D4908F' },
        mn: { 300: '#B8E0D2', 400: '#6BAF96' },
        lv: { 300: '#D4C5E2' },
        bdr: '#F0E6DC',
      },
      fontFamily: {
        jp: ['"Hiragino Kaku Gothic ProN"', '"Noto Sans JP"', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
  * { scrollbar-width: none; -ms-overflow-style: none; -webkit-overflow-scrolling: touch; }
  *::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="bg-gray-100 font-jp">

<!-- App Shell -->
<div id="app" class="mx-auto bg-cream-50 min-h-screen max-w-3xl relative overflow-hidden">

  <!-- ===== HOME ===== -->
  <div id="screen-home">
    <!-- Header -->
    <div class="flex items-center justify-between px-5 pt-5 pb-2 md:px-8 md:pt-6">
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-warm-500 tracking-tight">えほんのもり</h1>
        <p class="text-xs md:text-sm text-warm-600 mt-0.5">すてきな えほんに であおう</p>
      </div>
      <button onclick="showScreen('my')" class="w-9 h-9 md:w-11 md:h-11 rounded-full bg-cream-100 flex items-center justify-center">
        <svg class="w-5 h-5 md:w-6 md:h-6" viewBox="0 0 24 24"><path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4z" fill="#C4825A"/></svg>
      </button>
    </div>

    <!-- Age Filters -->
    <div id="age-filters" class="flex gap-1.5 md:gap-2 px-5 md:px-8 py-2 overflow-x-auto"></div>

    <!-- Recommend Section -->
    <div class="px-5 md:px-8 pt-3 pb-1">
      <h2 id="rec-title" class="text-sm md:text-base font-bold text-warm-500">おすすめ</h2>
    </div>
    <div id="rec-list" class="flex gap-2.5 md:gap-3.5 px-5 md:px-8 pb-5 overflow-x-auto"></div>

    <!-- Ranking Section -->
    <div class="px-5 md:px-8 pb-1.5 flex items-center gap-1.5">
      <svg class="w-4 h-4 md:w-5 md:h-5" viewBox="0 0 24 24"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.3 5.8 21l1.2-6.8-5-4.9 6.9-1z" fill="#E8A87C"/></svg>
      <h2 class="text-sm md:text-base font-bold text-warm-500">にんきランキング</h2>
    </div>
    <div id="rank-list" class="px-5 md:px-8 pb-8"></div>
  </div>

  <!-- ===== VIEWER ===== -->
  <div id="screen-viewer" class="absolute inset-0 z-20 hidden flex-col select-none" style="cursor:pointer">
    <!-- Page Content -->
    <div id="viewer-content" class="flex-1 flex flex-col items-center justify-center p-6 md:p-10 text-center" onclick="handleViewerTap(event)"></div>

    <!-- Overlay UI (top) -->
    <div id="viewer-ui-top" class="absolute top-0 left-0 right-0 flex items-center justify-between px-4 py-3 md:px-5 md:py-4 transition-opacity duration-300">
      <button onclick="event.stopPropagation();closeViewer()" class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-black/25 flex items-center justify-center">
        <svg class="w-4 h-4 md:w-5 md:h-5" viewBox="0 0 24 24"><path d="M19 11H7.8l4.6-4.6L11 5l-7 7 7 7 1.4-1.4L7.8 13H19v-2z" fill="white"/></svg>
      </button>
      <div id="viewer-page-num" class="px-3 py-1 rounded-xl bg-black/20 text-white text-xs md:text-sm font-medium"></div>
      <button id="viewer-like-btn" onclick="event.stopPropagation();toggleViewerLike()" class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-black/25 flex items-center justify-center"></button>
    </div>

    <!-- Nav Arrows -->
    <button id="viewer-prev" onclick="event.stopPropagation();viewerPrev()" class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 w-7 h-7 md:w-9 md:h-9 rounded-full bg-white/50 flex items-center justify-center transition-opacity duration-300">
      <svg class="w-3 h-3 md:w-4 md:h-4" viewBox="0 0 24 24"><path d="M15.4 7.4L14 6l-6 6 6 6 1.4-1.4L10.8 12z" fill="#4A3728"/></svg>
    </button>
    <button id="viewer-next" onclick="event.stopPropagation();viewerNext()" class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 w-7 h-7 md:w-9 md:h-9 rounded-full bg-white/50 flex items-center justify-center transition-opacity duration-300">
      <svg class="w-3 h-3 md:w-4 md:h-4" viewBox="0 0 24 24"><path d="M8.6 16.6L10 18l6-6-6-6-1.4 1.4L13.2 12z" fill="#4A3728"/></svg>
    </button>

    <!-- Dots -->
    <div id="viewer-dots" class="absolute bottom-4 md:bottom-5 left-0 right-0 flex justify-center gap-1 transition-opacity duration-300 pointer-events-none"></div>
  </div>

  <!-- ===== MY PAGE ===== -->
  <div id="screen-my" class="hidden">
    <div class="flex items-center px-4 md:px-8 py-3 md:py-4">
      <button onclick="showScreen('home')" class="flex items-center gap-1 text-xs md:text-sm text-warm-600">
        <svg class="w-4 h-4 md:w-5 md:h-5" viewBox="0 0 24 24"><path d="M20 11H7.8l5.6-5.6L12 4l-8 8 8 8 1.4-1.4L7.8 13H20v-2z" fill="#8B7B6B"/></svg>
        ホーム
      </button>
      <div class="flex-1 text-center text-sm md:text-base font-semibold text-warm-500">マイページ</div>
      <div class="w-14"></div>
    </div>
    <!-- Tabs -->
    <div class="flex mx-4 md:mx-8 border-b border-bdr">
      <button onclick="setMyTab('history')" id="my-tab-history" class="flex-1 text-center py-2.5 text-xs md:text-sm font-semibold border-b-2 transition-colors"></button>
      <button onclick="setMyTab('likes')" id="my-tab-likes" class="flex-1 text-center py-2.5 text-xs md:text-sm font-semibold border-b-2 transition-colors"></button>
    </div>
    <div id="my-content" class="px-4 md:px-8 py-3 overflow-auto"></div>
  </div>

</div>

<script>
const books = [
  { id:1, title:"くもの子マルの旅", author:"さくら絵本工房", likes:42, pages:12, color:"#FFE4CC", emoji:"cloud", age:"0-2", desc:"そらを たびする くもの子マルの ぼうけん" },
  { id:2, title:"たぬきとお月さま", author:"もりのアトリエ", likes:128, pages:15, color:"#D4E8D0", emoji:"moon", age:"3-5", desc:"おつきさまと なかよしの たぬきの おはなし" },
  { id:3, title:"ちいさなパン屋さん", author:"こむぎ堂", likes:89, pages:10, color:"#F5DEB3", emoji:"bread", age:"0-2", desc:"まちの パンやさんの いちにち" },
  { id:4, title:"うみのともだち", author:"なみのすけ", likes:67, pages:14, color:"#CCE5F0", emoji:"wave", age:"3-5", desc:"うみの なかまたちと あそぶ おはなし" },
  { id:5, title:"ほしぞらのひみつ", author:"よぞら工房", likes:156, pages:11, color:"#DDD5F3", emoji:"star", age:"6+", desc:"ほしの せかいを たんけん しよう" },
  { id:6, title:"どんぐりぼうやの冒険", author:"もりの絵本室", likes:34, pages:13, color:"#E8D5B7", emoji:"acorn", age:"3-5", desc:"もりの なかを どんぐりが ころころ" },
  { id:7, title:"にじいろのさかな", author:"うみの絵本室", likes:203, pages:16, color:"#C5DEF0", emoji:"wave", age:"0-2", desc:"きらきら うろこの さかなの おはなし" },
  { id:8, title:"おばけのともだち", author:"よるの工房", likes:97, pages:9, color:"#E0D5F0", emoji:"star", age:"6+", desc:"こわくない おばけと ともだちに なろう" },
];

const storyPages = [
  "むかしむかし、空のうえに\nちいさな くもの子がいました。",
  "マルという なまえの その子は\nまいにち そらを ながめていました。",
  "「したの せかいに いってみたいな」\nマルは おもいました。",
  "ある日、かぜが ふいてきて\nマルを そっと おしだしました。",
  "「わぁ！やまが みえる！」\nマルは おおきなこえで いいました。",
];

const covers = {
  cloud: `<svg viewBox="0 0 80 80"><ellipse cx="40" cy="48" rx="28" ry="18" fill="#fff" opacity=".7"/><ellipse cx="30" cy="42" rx="18" ry="14" fill="#fff" opacity=".8"/><ellipse cx="50" cy="40" rx="16" ry="12" fill="#fff" opacity=".9"/><circle cx="40" cy="38" r="4" fill="#E8A87C"/><circle cx="36" cy="37" r="1.5" fill="#4A3728"/><circle cx="44" cy="37" r="1.5" fill="#4A3728"/><path d="M38 41Q40 43 42 41" fill="none" stroke="#4A3728" stroke-width="1" stroke-linecap="round"/></svg>`,
  moon: `<svg viewBox="0 0 80 80"><circle cx="40" cy="36" r="20" fill="#FFEAA7"/><circle cx="48" cy="30" r="16" fill="BOOKCOLOR"/><ellipse cx="30" cy="60" rx="12" ry="6" fill="#8B6F4E" opacity=".3"/></svg>`,
  bread: `<svg viewBox="0 0 80 80"><ellipse cx="40" cy="44" rx="22" ry="16" fill="#DEB887"/><ellipse cx="40" cy="40" rx="20" ry="14" fill="#F5DEB3"/><path d="M28 38Q34 32 40 38Q46 32 52 38" fill="none" stroke="#DEB887" stroke-width="1.5"/></svg>`,
  wave: `<svg viewBox="0 0 80 80"><path d="M10 50Q20 40 30 50Q40 60 50 50Q60 40 70 50" fill="none" stroke="#87CEEB" stroke-width="3" opacity=".5"/><path d="M10 56Q20 46 30 56Q40 66 50 56Q60 46 70 56" fill="none" stroke="#87CEEB" stroke-width="2" opacity=".3"/><circle cx="40" cy="35" r="8" fill="#FFB347" opacity=".6"/></svg>`,
  star: `<svg viewBox="0 0 80 80"><circle cx="40" cy="40" r="30" fill="#1a1a3e" opacity=".1"/><polygon points="40,18 43,32 58,32 46,40 50,54 40,46 30,54 34,40 22,32 37,32" fill="#FFEAA7" opacity=".8"/><circle cx="28" cy="26" r="1.5" fill="#FFEAA7" opacity=".5"/></svg>`,
  acorn: `<svg viewBox="0 0 80 80"><ellipse cx="40" cy="50" rx="12" ry="10" fill="#C4A472"/><circle cx="40" cy="38" r="6" fill="#8B6F4E" opacity=".5"/><ellipse cx="38" cy="32" rx="8" ry="4" fill="#7BBFA5" opacity=".4"/></svg>`,
};

function getCover(book, cls) {
  return `<div class="${cls}">${(covers[book.emoji]||covers.acorn).replace('BOOKCOLOR', book.color)}</div>`;
}

function heartSvg(filled, cls='w-3.5 h-3.5') {
  return `<svg class="${cls}" viewBox="0 0 20 20"><path d="M10 17l-1.4-1.3C3.8 11.2 1 8.7 1 5.5 1 3 3 1 5.5 1c1.5 0 3 .7 4 1.8L10 3l.5-.2C11.5 1.7 13 1 14.5 1 17 1 19 3 19 5.5c0 3.2-2.8 5.7-7.6 10.2L10 17z" fill="${filled?'#D4908F':'none'}" stroke="${filled?'#D4908F':'#B8A99A'}" stroke-width="1.5"/></svg>`;
}

let state = { ageFilter:'all', likes: new Set(), history: [], myTab: 'history' };
let viewer = { book: null, page: 0, showUI: true, uiTimer: null };

const ageFilters = [{id:'all',label:'すべて'},{id:'0-2',label:'0〜2さい'},{id:'3-5',label:'3〜5さい'},{id:'6+',label:'6さい〜'}];
const rankColors = ['#E8A87C','#B8E0D2','#FDDCB5'];
const timeLabels = ['いま','3ぷんまえ','きょう','きのう'];

function showScreen(name) {
  document.getElementById('screen-home').classList.toggle('hidden', name !== 'home');
  document.getElementById('screen-viewer').classList.toggle('hidden', name !== 'viewer');
  document.getElementById('screen-viewer').style.display = name === 'viewer' ? 'flex' : 'none';
  document.getElementById('screen-my').classList.toggle('hidden', name !== 'my');
  if (name === 'my') renderMy();
}

function getFiltered() {
  return state.ageFilter === 'all' ? books : books.filter(b => b.age === state.ageFilter);
}

function renderFilters() {
  const el = document.getElementById('age-filters');
  el.innerHTML = ageFilters.map(f => {
    const active = state.ageFilter === f.id;
    return `<button onclick="setFilter('${f.id}')" class="px-3.5 md:px-4.5 py-1.5 rounded-full text-xs md:text-sm font-semibold whitespace-nowrap border-[1.5px] transition-all ${active ? 'bg-cream-100 text-warm-400 border-warm-300' : 'bg-transparent text-warm-700 border-bdr'}">${f.label}</button>`;
  }).join('');
}

function renderRec() {
  const filtered = getFiltered();
  const rec = filtered.slice(0, 5);
  const title = state.ageFilter === 'all' ? 'おすすめ' : `${ageFilters.find(f=>f.id===state.ageFilter).label}の おすすめ`;
  document.getElementById('rec-title').textContent = title;
  document.getElementById('rec-list').innerHTML = rec.map(b => `
    <div onclick="openBook(${b.id})" class="flex-shrink-0 w-[120px] md:w-[150px] cursor-pointer">
      <div class="h-[140px] md:h-[170px] rounded-xl flex items-center justify-center" style="background:${b.color}">
        ${getCover(b, 'w-[70px] h-[70px] md:w-[90px] md:h-[90px]')}
      </div>
      <div class="pt-1.5 px-0.5">
        <div class="text-[11px] md:text-[13px] font-semibold text-warm-500 leading-tight truncate">${b.title}</div>
        <div class="text-[10px] md:text-[11px] text-warm-700 mt-0.5">${b.author}</div>
      </div>
    </div>
  `).join('');
}

function renderRanking() {
  const filtered = getFiltered();
  const sorted = [...filtered].sort((a,b) => b.likes - a.likes);
  document.getElementById('rank-list').innerHTML = sorted.map((b, i) => {
    const isLiked = state.likes.has(b.id);
    const rc = i < 3 ? rankColors[i] : '#F0E6DC';
    const tc = i < 3 ? '#fff' : '#8B7B6B';
    return `<div onclick="openBook(${b.id})" class="flex items-center gap-2.5 md:gap-3.5 py-2.5 md:py-3 border-b border-bdr cursor-pointer">
      <div class="w-6 h-6 md:w-7 md:h-7 rounded-full flex items-center justify-center text-[11px] md:text-xs font-bold shrink-0" style="background:${rc};color:${tc}">${i+1}</div>
      <div class="w-12 h-14 md:w-14 md:h-16 rounded-lg flex items-center justify-center shrink-0 overflow-hidden" style="background:${b.color}">
        ${getCover(b, 'w-10 h-10 md:w-12 md:h-12')}
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-xs md:text-sm font-semibold text-warm-500 truncate">${b.title}</div>
        <div class="text-[10px] md:text-xs text-warm-700 mt-0.5">${b.author}</div>
      </div>
      <div class="flex items-center gap-1 shrink-0">
        ${heartSvg(isLiked, 'w-3.5 h-3.5')}
        <span class="text-[11px] md:text-xs text-warm-700">${b.likes}</span>
      </div>
    </div>`;
  }).join('');
}

function setFilter(id) {
  state.ageFilter = id;
  renderFilters(); renderRec(); renderRanking();
}

function renderHome() { renderFilters(); renderRec(); renderRanking(); }

// === VIEWER ===
function openBook(id) {
  const book = books.find(b => b.id === id);
  if (!book) return;
  viewer = { book, page: 0, showUI: true, uiTimer: null };
  state.history = [{ id: book.id, time: timeLabels[Math.min(state.history.filter(h=>h.id!==id).length, timeLabels.length-1)] }, ...state.history.filter(h => h.id !== id)];
  document.getElementById('screen-viewer').style.background = book.color;
  showScreen('viewer');
  renderViewer();
}

function closeViewer() { showScreen('home'); }

function renderViewer() {
  const b = viewer.book;
  const total = storyPages.length + 2;
  const isCover = viewer.page === 0;
  const isEnd = viewer.page === total - 1;
  const si = viewer.page - 1;
  const isLiked = state.likes.has(b.id);
  const content = document.getElementById('viewer-content');
  const ageLabel = ageFilters.find(f=>f.id===b.age)?.label || '';

  if (isCover) {
    content.innerHTML = `
      ${getCover(b, 'w-[140px] h-[140px] md:w-[180px] md:h-[180px]')}
      <div class="mt-5 md:mt-6 text-xl md:text-2xl font-bold text-warm-500 leading-snug">${b.title}</div>
      <div class="mt-2 md:mt-2.5 text-sm md:text-base text-warm-600">${b.author}</div>
      <div class="mt-3 text-xs md:text-sm text-warm-700 leading-relaxed max-w-sm">${b.desc}</div>
      <div class="mt-4 flex gap-4 text-xs md:text-sm text-warm-700">
        <span>${b.pages}ページ</span><span>${ageLabel}</span>
      </div>`;
  } else if (isEnd) {
    content.innerHTML = `
      <div class="text-base md:text-lg font-semibold text-warm-500 mb-6">おしまい</div>
      ${getCover(b, 'w-[80px] h-[80px] md:w-[100px] md:h-[100px]')}
      <div class="mt-5 text-base md:text-lg font-semibold text-warm-500">${b.title}</div>
      <div class="mt-1.5 text-sm text-warm-600">${b.author}</div>
      <button onclick="event.stopPropagation();toggleViewerLike()" class="mt-7 flex items-center gap-2 px-6 md:px-8 py-2.5 md:py-3 rounded-full text-sm md:text-base font-semibold transition-all ${isLiked ? 'bg-pk-400 text-white' : 'bg-white/80 text-warm-500'}">
        ${heartSvg(isLiked, 'w-5 h-5')}
        ${isLiked ? 'いいね済み' : 'いいねする'}
      </button>
      <button onclick="event.stopPropagation();closeViewer()" class="mt-3 text-sm text-warm-600 underline">ホームにもどる</button>`;
  } else {
    const text = storyPages[si] || `${si+1}ページめの おはなし`;
    content.innerHTML = `
      <div class="flex flex-col md:flex-row items-center justify-center gap-5 md:gap-10 w-full">
        ${getCover(b, 'w-[100px] h-[100px] md:w-[150px] md:h-[150px]')}
        <div class="text-sm md:text-xl leading-[2] md:leading-[2] text-warm-500 whitespace-pre-line font-medium md:text-left max-w-sm">${text}</div>
      </div>`;
  }

  document.getElementById('viewer-page-num').textContent = `${viewer.page + 1} / ${total}`;
  document.getElementById('viewer-like-btn').innerHTML = heartSvg(isLiked, 'w-[18px] h-[18px] md:w-5 md:h-5');

  const showNav = !isCover && !isEnd && viewer.showUI;
  document.getElementById('viewer-ui-top').style.opacity = viewer.showUI && !isEnd ? '1' : '0';
  document.getElementById('viewer-ui-top').style.pointerEvents = viewer.showUI && !isEnd ? 'auto' : 'none';
  document.getElementById('viewer-prev').style.opacity = showNav && viewer.page > 1 ? '1' : '0';
  document.getElementById('viewer-prev').style.pointerEvents = showNav && viewer.page > 1 ? 'auto' : 'none';
  document.getElementById('viewer-next').style.opacity = showNav ? '1' : '0';
  document.getElementById('viewer-next').style.pointerEvents = showNav ? 'auto' : 'none';

  const dots = document.getElementById('viewer-dots');
  dots.style.opacity = !viewer.showUI && !isEnd ? '1' : '0';
  dots.innerHTML = Array.from({length: total}, (_,i) =>
    `<div class="h-[5px] rounded-full transition-all ${i===viewer.page ? 'w-[14px] md:w-[18px] bg-white/90' : 'w-[5px] md:w-[6px] bg-white/35'}"></div>`
  ).join('');

  resetUITimer();
}

function resetUITimer() {
  clearTimeout(viewer.uiTimer);
  if (viewer.showUI) viewer.uiTimer = setTimeout(() => { viewer.showUI = false; renderViewer(); }, 3000);
}

function handleViewerTap(e) {
  const r = e.currentTarget.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width;
  const y = (e.clientY - r.top) / r.height;
  const total = storyPages.length + 2;
  const isEnd = viewer.page === total - 1;
  if (isEnd) return;
  if (y < 0.12 || y > 0.88) { viewer.showUI = !viewer.showUI; renderViewer(); return; }
  if (x > 0.6) viewerNext();
  else if (x < 0.35) viewerPrev();
  else { viewer.showUI = !viewer.showUI; renderViewer(); }
}

function viewerNext() {
  const total = storyPages.length + 2;
  if (viewer.page < total - 1) { viewer.page++; viewer.showUI = true; renderViewer(); }
}

function viewerPrev() {
  if (viewer.page > 0) { viewer.page--; viewer.showUI = true; renderViewer(); }
}

function toggleViewerLike() {
  const id = viewer.book.id;
  state.likes.has(id) ? state.likes.delete(id) : state.likes.add(id);
  renderViewer(); renderRanking();
}

// === MY PAGE ===
function setMyTab(tab) {
  state.myTab = tab;
  renderMy();
}

function renderMy() {
  const liked = books.filter(b => state.likes.has(b.id));
  const hist = state.history.map(h => ({...books.find(b=>b.id===h.id), time: h.time})).filter(b=>b.title);

  const hTab = document.getElementById('my-tab-history');
  const lTab = document.getElementById('my-tab-likes');
  hTab.textContent = `りれき (${hist.length})`;
  lTab.textContent = `いいね (${liked.length})`;
  hTab.className = `flex-1 text-center py-2.5 text-xs md:text-sm font-semibold border-b-2 transition-colors ${state.myTab === 'history' ? 'text-warm-300 border-warm-300' : 'text-warm-700 border-transparent'}`;
  lTab.className = `flex-1 text-center py-2.5 text-xs md:text-sm font-semibold border-b-2 transition-colors ${state.myTab === 'likes' ? 'text-warm-300 border-warm-300' : 'text-warm-700 border-transparent'}`;

  const el = document.getElementById('my-content');
  if (state.myTab === 'history') {
    if (hist.length === 0) {
      el.innerHTML = `<div class="text-center py-10 text-warm-700 text-xs md:text-sm leading-relaxed">まだ よんだ えほんが ありません。<br>ホームから えほんを えらんでみよう。</div>`;
    } else {
      el.innerHTML = hist.map(b => `
        <div onclick="openBook(${b.id})" class="flex items-center gap-2.5 md:gap-3.5 py-2.5 md:py-3 border-b border-bdr cursor-pointer">
          <div class="w-12 h-14 md:w-14 md:h-16 rounded-lg flex items-center justify-center shrink-0 overflow-hidden" style="background:${b.color}">
            ${getCover(b, 'w-10 h-10 md:w-12 md:h-12')}
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-xs md:text-sm font-semibold text-warm-500 truncate">${b.title}</div>
            <div class="text-[10px] md:text-xs text-warm-700 mt-0.5">${b.author}</div>
          </div>
          <div class="text-[10px] md:text-xs text-warm-700 shrink-0">${b.time}</div>
        </div>
      `).join('');
    }
  } else {
    if (liked.length === 0) {
      el.innerHTML = `<div class="text-center py-10 text-warm-700 text-xs md:text-sm leading-relaxed">まだ いいねした えほんが ありません。<br>すきな えほんに いいねしよう。</div>`;
    } else {
      el.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-3 gap-2.5 md:gap-3.5 pt-2">${liked.map(b => `
        <div onclick="openBook(${b.id})" class="cursor-pointer">
          <div class="h-[120px] md:h-[150px] rounded-xl flex items-center justify-center" style="background:${b.color}">
            ${getCover(b, 'w-[60px] h-[60px] md:w-[80px] md:h-[80px]')}
          </div>
          <div class="text-[11px] md:text-[13px] font-semibold text-warm-500 mt-1 truncate">${b.title}</div>
          <div class="text-[10px] md:text-[11px] text-warm-700">${b.author}</div>
        </div>
      `).join('')}</div>`;
    }
  }
}

renderHome();
</script>
</body>
</html>
